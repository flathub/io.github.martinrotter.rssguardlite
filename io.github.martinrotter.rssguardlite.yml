id: io.github.martinrotter.rssguardlite
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang # To build rssguard-article-extractor
command: rssguard

finish-args:
  - --device=dri
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --socket=wayland
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: clang-format
    buildsystem: cmake-ninja
    subdir: llvm
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=MinSizeRel
      - -DBUILD_SHARED_LIBS=OFF
      - -DLLVM_ENABLE_PROJECTS=clang
    make-args:
      - clang-format
    no-make-install: true
    build-commands:
      - install -Dt /app/bin bin/clang-format
    sources:
      - type: archive
        url: https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.8/llvm-project-22.1.8.src.tar.xz
        sha256: 922f1817a0df7b1489272d18134ee0087a8b068828f87ac63b9861b1a9965888
        x-checker-data:
          type: anitya
          project-id: 1830
          stable-only: true
          url-template: https://github.com/llvm/llvm-project/releases/download/llvmorg-$version/llvm-project-$version.src.tar.xz

  - name: qxmpp
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_TESTING=OFF
      - -DBUILD_DOCUMENTATION=OFF
      - -DBUILD_EXAMPLES=OFF
    sources:
      - type: archive
        url: https://download.kde.org/unstable/qxmpp/qxmpp-1.16.1.tar.xz
        sha256: d81a53808fc82fa811eb4a002bf13e2a1258edf5d63099e4766d00d5ece6ba61
        x-checker-data:
          type: anitya
          project-id: 4149
          stable-only: true
          url-template: https://download.kde.org/unstable/qxmpp/qxmpp-$version.tar.xz
    cleanup:
      - /include
      - /lib/cmake
      - /lib/pkgconfig

  - name: rssguard
    buildsystem: cmake-ninja
    build-options:
      append-path: /usr/lib/sdk/golang/bin
      env:
        GOROOT: /usr/lib/sdk/golang
    config-opts:
      - -DIS_DEV_BUILD=OFF
      - -DREVISION_FROM_GIT=OFF
      - -DNO_UPDATE_CHECK=ON
      - -DIS_FLATPAK_BUILD=ON
      - -DBUILD_XMPP_PLUGIN=ON
      - -DWEB_ARTICLE_VIEWER_WEBENGINE=OFF
      - -DENABLE_MEDIAPLAYER_LIBMPV=OFF
    sources:
      - type: archive
        url: https://github.com/martinrotter/rssguard/releases/download/5.2.1/rssguard-5.2.1-src.tar.gz
        sha256: f7134fda8bbaf7bd87aeccf4e3473b2220a516ae99128f69e2ee6a017a403caf
        x-checker-data:
          type: anitya
          project-id: 19046
          stable-only: true
          url-template: https://github.com/martinrotter/rssguard/releases/download/$version/rssguard-$version-src.tar.gz
    cleanup:
      - /include
